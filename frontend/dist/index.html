<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://newboy.ren/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>LLMImageRender - 柜子家具3D渲染平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- 主题初始化：避免页面加载时闪烁（FOUC）。
         优先级：URL ?theme= > localStorage > 默认 dark -->
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search)
          var fromUrl = params.get('theme')
          var stored = localStorage.getItem('theme')
          var persisted = stored ? JSON.parse(stored).mode : null
          var theme = fromUrl === 'light' || fromUrl === 'dark'
            ? fromUrl
            : (persisted === 'light' || persisted === 'dark' ? persisted : 'dark')
          if (theme === 'dark') document.documentElement.classList.add('dark')
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#0a0a0f' : '#eef2f8')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <script type="module" crossorigin src="/llmimagerender/assets/index-DKn9a8P0.js"></script>
    <link rel="stylesheet" crossorigin href="/llmimagerender/assets/index-CeLFEzQb.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
